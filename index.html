<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tax Twin Easy</title>

    <!-- Tailwind CSS (Play CDN — JIT-compiles utility classes in the browser, no build step) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Import map: lets plain `import react from "react"` resolve in the browser -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.1",
          "react-dom/client": "https://esm.sh/react-dom@19.0.1/client?deps=react@19.0.1",
          "react/jsx-runtime": "https://esm.sh/react@19.0.1/jsx-runtime",
          "lucide-react": "https://esm.sh/lucide-react@0.546.0?deps=react@19.0.1",
          "motion/react": "https://esm.sh/motion@12.23.24/react?deps=react@19.0.1,react-dom@19.0.1",
          "react-markdown": "https://esm.sh/react-markdown@10.1.0?deps=react@19.0.1"
        }
      }
    </script>

    <!-- Babel standalone: transforms the JSX/TypeScript in app.tsx directly in the browser -->
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <style>
      html {
        font-size: 16px;
      }
      @media (min-width: 640px) {
        html {
          font-size: 17px;
        }
      }
      @media (min-width: 1024px) {
        html {
          font-size: 18px;
        }
      }
      /* Custom overrides to scale up small texts for better accessibility and legibility */
      .text-xs {
        font-size: 0.875rem !important; /* 14px equivalent */
      }
      .text-\[10px\] {
        font-size: 0.8rem !important; /* 12.8px equivalent */
      }
      .text-\[9px\] {
        font-size: 0.75rem !important; /* 12px equivalent */
      }
      .text-sm {
        font-size: 0.95rem !important; /* Slightly larger sm */
      }
      .text-base {
        font-size: 1.05rem !important; /* Slightly larger base */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,typescript" src="./app.tsx"></script>
  </body>
</html>
